[build]
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

# Long-cache for static media assets — fingerprinted by path so safe to
# cache forever; bump filenames if you ever swap the contents.
[[headers]]
  for = "/in-action/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/vision/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.mp4"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
