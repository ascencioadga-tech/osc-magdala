  *{margin:0;padding:0;box-sizing:border-box}

  .card{width:100%;max-width:380px;text-align:center}

    padding:0 14px;font-size:15px;color:#fff;text-align:center;letter-spacing:.02em}
  input::placeholder{color:rgba(244,241,236,.5)}
  input:focus{outline:none;border-color:#b19277;background:rgba(244,241,236,.12)}
  button{height:46px;border:none;border-radius:8px;background:#b19277;color:#290818;font-size:14px;
    font-weight:500;letter-spacing:.04em;cursor:pointer;transition:background .2s}
  button:hover{background:#c9a985}
  .err{font-size:12.5px;color:#f0b8b8;min-height:16px;margin-top:2px}
  .splash{font-size:13px;color:rgba(244,241,236,.6);letter-spacing:.12em;text-transform:uppercase}
  .rule{height:1px;width:64px;background:rgba(177,146,119,.6);margin:22px auto 0}
</style>

  const b = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
  async function decrypt(pw){
    const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(pw), "PBKDF2", false, ["deriveKey"]);
    const key = await crypto.subtle.deriveKey(
      { name:"PBKDF2", salt:b(ENC.salt), iterations:ENC.iter, hash:"SHA-256" },
      km, { name:"AES-GCM", length:256 }, false, ["decrypt"]);
    const buf = await crypto.subtle.decrypt({ name:"AES-GCM", iv:b(ENC.iv) }, key, b(ENC.ct));
    return new TextDecoder().decode(buf);
  }
  const form = document.getElementById("f");
  const splash = document.getElementById("splash");
  const err = document.getElementById("err");
  function showForm(){ splash.style.display="none"; form.style.display="flex"; document.getElementById("pw").focus(); }
  async function open(pw, silent){
    try {
      const html = await decrypt(pw);
      sessionStorage.setItem("osc-deck-pw", pw);
      document.open(); document.write(html); document.close();
    } catch(e){
      if(silent){ sessionStorage.removeItem("osc-deck-pw"); showForm(); }
      else { err.textContent = "That password didn\u2019t work. Try again."; }
    }
  }
  form.addEventListener("submit", e => { e.preventDefault(); err.textContent=""; open(document.getElementById("pw").value, false); });
  (async () => {
    const saved = sessionStorage.getItem("osc-deck-pw");
    if(saved){ await open(saved, true); } else { showForm(); }
  })();
